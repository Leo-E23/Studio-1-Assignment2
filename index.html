             data-sound="Sounds/Far-Eastern-Curlew.mp3"
             height="250" width="250">
    </div>
</div>

<script>
   window.onload = function () {

    const images = document.querySelectorAll(".animal");

    images.forEach(img => {

        const sound = new buzz.sound(img.dataset.sound);

        
        let isSwapped = false;

        img.addEventListener("click", function () {

            if (!isSwapped) {
                img.src = img.dataset.map;
                sound.play(); 
                buzz.all().stop();
                sound.play();
            } else {
                img.src = img.dataset.animal;
                
            }

            isSwapped = !isSwapped;
        });
    });
};
 </script>
